# Plan B Iteration 2 — measurement source-of-truth (9 모델).
# Schema: each [[model]] entry has id / provider / model / base_url? / api_key_env?
# - base_url: optional. Omit to use llm/registry.go default (groqDefaultBaseURL etc.)
# - api_key_env: optional. Omit (lmstudio, ollama) when provider needs no auth (local SSH tunnel).
# selection rationale: see .claude/plans/kp-eval-rebuild.md (Iter 1) + kp-eval-iter2.md (Iter 2).
# rejected siblings: see apps/kittypaw/docs/MODEL_GUIDE.md § 1.1.

[[model]]
id = "groq-qwen"
provider = "groq"
model = "qwen/qwen3-32b"
base_url = "https://api.groq.com/openai/v1/chat/completions"
api_key_env = "GROQ_API_KEY"
eval_enabled = false
exclude_reason = "free API tier hit 429/rate-limit during KittyPaw eval; not reliable as default assistant recommendation"

