<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KittyPaw Home Chat</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main id="home-chat-root" class="home-chat-shell">
    <section class="chat-panel">
      <header>
        <p>KittyPaw Home</p>
        <h1>Chat</h1>
      </header>
      <div id="chat-log" aria-live="polite"></div>
      <form id="chat-form">
        <textarea id="chat-input" name="message" rows="3"></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>
  <script src="/assets/chat.js"></script>
</body>
</html>
